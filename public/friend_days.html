<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>みんなの日記</title>

    <link rel="stylesheet" href="./friendDays.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="headText">
        <h2>友達と自分の日記</h2>
    </div>

    <div id="diaryContainer"></div>

    <div class="darkmode">
        <button id="darkmodeBtn">
            ダークモードにする
        </button>
    </div>

    <nav class="bottom-nav">

        <a href="./index.html" class="nav-item">
            <i class="bi bi-house-fill"></i>
            <span>ホーム</span>
        </a>

        <a href="./friends.html" class="nav-item">
            <i class="bi bi-person-fill-add"></i>
            <span>フレンド追加</span>
        </a>

        <!-- ⭐ここが友達共有ページ -->
        <a href="./friends-days.html" class="nav-item active">
            <i class="bi bi-people-fill"></i>
            <span>みんな</span>
        </a>

        <a href="./Mydays.html" class="nav-item">
            <i class="bi bi-journal-text"></i>
            <span>日記</span>
        </a>

        <a href="./mypage.html" class="nav-item">
            <i class="bi bi-person-circle"></i>
            <span>マイ</span>
        </a>

    </nav>

    <script>
        async function loadFriendsDiaries() {

            const res = await fetch("/api/friends-diary");
            const diaries = await res.json();

            const container = document.getElementById("diaryContainer");
            container.innerHTML = "";

            diaries.forEach(d => {

                const div = document.createElement("div");
                div.classList.add("diary-card");

                div.innerHTML = `
                    <h3>${d.title ?? ""}</h3>
                    <p>${d.content}</p>
                    <small>${d.date ?? ""}</small>
                    <br>

                    <button onclick="tiggleLike(${d.id})">
                        いいね👍
                    </button>

                    <span  id="like-${d.id}">0</span>
                `;

                container.appendChild(div);

                loadLikeCount(d.id);
            });
        }
    async function toggleLike(postId) {

    await fetch("/api/like", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            postId: postId
        })
    });

    loadLikeCount(postId);
}

        loadFriendsDiaries();

        // ダークモード（そのまま流用）
        const btn = document.getElementById("darkmodeBtn");

        btn.addEventListener("click", () => {
            document.body.classList.toggle("dark");
        });
    </script>

</body>
</html>
