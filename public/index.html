<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <title>毎日日記app</title>
</head>
<body>
<div class="headtext">
    <h2>毎日日記<i class="bi bi-journals"></i></h2>
    <h3>小さな記録を、毎日の習慣に。</h3>
</div>

    <div class="container">
        <div class="explanation">
            <p>毎日日記の説明と利用規約について</p>
            <p>毎日日記の説明</p>
            <h2>
            毎日日記とは、自分だけの日記を作成して思い出を記録したり、<br>
            友達と日記を共有して、お互いの一日を見たり会話したりできるアプリです！
            </h2>
            <p>毎日日記の利用規約とその他</p>
            <a href="#">毎日日記の使用規約<i class="bi bi-file-earmark-text"></i></a>
            <a href="#">プライバシーポリシーに関する記述<i class="bi bi-shield-check"></i></a>
            <div id="auth"></div>
        </div>
    </div>

    <div class="inputText">
        <div class="form-glorp">
            <h4>日記制作フォーム</h4>
            <form id="diaryForm">
                <input type="text" id="titleInput" name="title" placeholder="題名">

                <textarea id="contentInput" name="content" placeholder="今日あったこと"></textarea>

                <input type="file" id="imageInput" name="image">

                <input type="date" id="daysInput" name="date"
                min="2025-06-01" max="2030-12-31">

               <button type="submit">日記を作成する</button>
            </form>
        </div>
    </div>
