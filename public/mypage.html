<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./mypage.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
    <title>プロフィール</title>
</head>
<body>

<div class="container">

    <!-- プロフィール -->
    <div class="profile-card">
        <div class="avatar"></div>

        <h1 id="username">ユーザー名</h1>
        <p id="email">email@example.com</p>

        <div class="stats">
            <div>
                <h3 id="postCount">0</h3>
                <p>投稿</p>
            </div>
            <div>
                <h3 id="friendCount">0</h3>
                <p>友達</p>
            </div>
        </div>

        <button class="edit-btn" onclick="toggleEditBox()">プロフィール編集</button>
        <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>

    <!-- 投稿一覧 -->
    <div class="diary-section">
        <h2>自分の投稿</h2>
        <div id="diaryList"></div>
    </div>

    <div class="home-link">
    <a href="./index.html">ホームに戻る</a>
   </div>

<div id="editBox" class="edit-box">
    <h3>プロフィール編集</h3>

    <input id="editUsername" placeholder="ユーザー名">
    <input id="editEmail" placeholder="メール">

    <button onclick="updateProfile()">保存</button>
</div>

</div>
<nav class="bottom-nav">

    <!-- ホーム -->
    <a href="./index.html" class="nav-item ">
        <i class="bi bi-house-fill"></i>
        <span>ホーム</span>
    </a>

    <!--友達追加-->
    <a href="./friends.html" class="nav-item">
        <i class="bi bi-person-fill-add"></i>
        <span>フレンド追加</span>
    </a>

    <!-- 友達 -->
    <a href="#" class="nav-item">
        <i class="bi bi-people-fill"></i>
        <span>友達</span>
    </a>

    <!-- 自分の日記 -->
    <a href="./Mydays.html" class="nav-item">
        <i class="bi bi-journal-text"></i>
        <span>日記</span>
    </a>

    <!-- マイページ -->
    <a href="./mypage.html" class="nav-item active">
        <i class="bi bi-person-circle"></i>
        <span>マイ</span>
    </a>

</nav>

<script src="./mypage.js"></script>
    
</body>
</html>
