<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<title>Login UI</title>

<style>
/* =========================
   reset
========================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI",sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* =========================
   container
========================= */
.container{
  width:900px;
  max-width:100%;
  min-height:550px;
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  position:relative;
  display:flex;
  box-shadow:0 10px 40px rgba(0,0,0,0.15);
}

/* =========================
   form
========================= */
.form-box{
  width:50%;
  padding:60px 50px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  transition:0.5s ease;
  background:#fff;
}

.form-box h2{
  font-size:32px;
  color:#222;
  margin-bottom:10px;
}

.form-box p{
  color:#777;
  margin-bottom:25px;
  font-size:14px;
}

input{
  width:100%;
  padding:14px 16px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  background:#f4f6fb;
  font-size:15px;
  transition:0.25s;
}

input:focus{
  outline:none;
  background:#fff;
  box-shadow:0 0 0 2px #667eea55;
}

button{
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#667eea;
  color:#fff;
  font-size:15px;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:#5563d5;
  transform:translateY(-2px);
}

/* =========================
   overlay
========================= */
.overlay{
  position:absolute;
  top:0;
  right:0;
  width:50%;
  height:100%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px;
  transition:0.5s ease;
}

.overlay h2{
  font-size:34px;
  margin-bottom:15px;
}

.overlay p{
  font-size:15px;
  line-height:1.7;
}

.overlay button{
  background:#fff;
  color:#667eea;
}

.overlay button:hover{
  background:#f2f2f2;
}

/* =========================
   animation
========================= */
.register-box{
  opacity:0;
  pointer-events:none;
  transform:translateX(40px);
}

.container.active .overlay{
  transform:translateX(-100%);
}

.container.active .login-box{
  opacity:0;
  pointer-events:none;
  transform:translateX(-40px);
}

.container.active .register-box{
  opacity:1;
  pointer-events:auto;
  transform:translateX(0);
}

/* =========================
   mobile
========================= */
@media screen and (max-width:768px){

  body{
    padding:12px;
    align-items:flex-start;
  }

  .container{
    width:100%;
    min-height:auto;
    flex-direction:column;
    border-radius:20px;
  }

  .overlay{
    position:relative;
    width:100%;
    height:auto;
    min-height:180px;
    transform:none !important;
    padding:35px 25px;
  }

  .overlay h2{
    font-size:28px;
  }

  .overlay p{
    font-size:14px;
  }

  .form-box{
    width:100%;
    padding:35px 25px;
  }

  .form-box h2{
    font-size:28px;
  }

  input{
    padding:13px;
    font-size:14px;
  }

  button{
    padding:13px;
    font-size:14px;
  }

  /* スマホでは片方だけ表示 */
  .register-box{
    display:none;
    opacity:1;
    transform:none;
  }

  .container.active .login-box{
    display:none;
    opacity:1;
    transform:none;
  }

  .container.active .register-box{
    display:flex;
  }
}
</style>
</head>

<body>

<div class="container" id="container">

  <!-- ログイン -->
  <div class="form-box login-box">
    <h2>ログイン</h2>
    <form action="/login" method="POST" id="loginForm">
    <input name="username" type="text" placeholder="ユーザーネーム">
    <input name="password" type="password" placeholder="パスワード">
    <button>ログイン</button>
    </form>
  </div>

  <!-- 登録 -->
  <div class="form-box register-box">
    <h2>新規登録</h2>
    <form action="/register" method="POST" id="registerForm">
    <input name="username" type="text" placeholder="ユーザー名">
    <input name="email" type="email" placeholder="メールアドレス">
    <input name="password" type="password" placeholder="パスワード">
    <button>登録</button>
    </form>
  </div>
  <!-- パネル -->
  <div class="overlay">
    <div>
      <h2 id="title">交換日記へようこそ！</h2>
      <p id="text">よりよくサービスを利用するために <br>アカウントを作成 or ログインしてください</p>
      <button onclick="toggle()">切り替え</button>
    </div>
  </div>

</div>

<script>
const container = document.getElementById("container");

let isLogin = true;

function toggle(){
  container.classList.toggle("active");
  isLogin = !isLogin;
}
const form =
    document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    const data = {
        username: formData.get("username"),
        password: formData.get("password")
    };

    const res = await fetch("/login", {
        credentials: "include",
        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify(data)
    });

    if (res.ok) {

        location.href = "/index.html";

    } else {

        const text = await res.text();

        alert(text);
    }
});
const registerForm =
    document.getElementById("registerForm");

registerForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(registerForm);

    const data = {
        username: formData.get("username"),
        email: formData.get("email"),
        password: formData.get("password")
    };

    const res = await fetch("/register", {
       credentials: "include",
        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify(data)
    });

    if (res.ok) {

        location.href = "/index.html";

    } else {

        const text = await res.text();

        alert(text);
    }
});
</script>

</body>
</html>
