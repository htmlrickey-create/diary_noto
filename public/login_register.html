<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<title>Login UI</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: "Segoe UI", sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#667eea,#764ba2);
  overflow:hidden;
}

/* ===== 外枠 ===== */
.container{
  width:850px;
  max-width:95%;
  height:520px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  display:flex;
  background:#fff;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

/* ===== フォーム共通 ===== */
.form-box{
  width:50%;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  transition:0.7s cubic-bezier(.2,.8,.2,1);
}

h2{
  margin-bottom:15px;
  color:#333;
}

input{
  padding:12px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:8px;
  outline:none;
  transition:0.2s;
}

input:focus{
  border-color:#667eea;
  transform:scale(1.02);
}

button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#667eea;
  color:#fff;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#5563d5;
  transform:translateY(-2px);
}

/* ===== オーバーレイ ===== */
.overlay{
  position:absolute;
  top:0;
  left:50%;
  width:50%;
  height:100%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  transition:0.7s cubic-bezier(.2,.8,.2,1);
}

/* ===== 初期状態 ===== */
.login-box{
  z-index:2;
}

.register-box{
  opacity:0;
  transform:scale(0.9);
  pointer-events:none;
}

/* ===== 切替アニメーション ===== */
.container.active .overlay{
  left:0;
}

.container.active .login-box{
  transform:translateX(100%) scale(0.9);
  opacity:0;
  pointer-events:none;
  filter:blur(10px);
}

.container.active .register-box{
  opacity:1;
  transform:translateX(0) scale(1);
  pointer-events:auto;
}

/* ===== スマホ対応（ここ重要） ===== */
@media (max-width:768px){

  .container{
    flex-direction:column;
    height:auto;
  }

  .form-box{
    width:100%;
  }

  .overlay{
    position:relative;
    width:100%;
    height:140px;
    left:0;
  }

  /* スマホアニメーション維持 */
  .container.active .login-box{
    transform:translateY(-20px);
    opacity:0;
  }

  .container.active .register-box{
    transform:translateY(0);
    opacity:1;
  }

  .container.active .overlay{
    transform:translateY(-10px);
  }
}
</style>
</head>

<body>

<div class="container" id="container">

  <!-- ログイン -->
  <div class="form-box login-box">
    <h2>ログイン</h2>
    <form action="/login" method="POST" id="loginForm">
    <input name="username" type="text" placeholder="ユーザーネーム">
    <input name="password" type="password" placeholder="パスワード">
    <button>ログイン</button>
    </form>
  </div>

  <!-- 登録 -->
  <div class="form-box register-box">
    <h2>新規登録</h2>
    <form action="/register" method="POST" id="registerForm">
    <input name="username" type="text" placeholder="ユーザー名">
    <input name="email" type="email" placeholder="メールアドレス">
    <input name="password" type="password" placeholder="パスワード">
    <button>登録</button>
    </form>
  </div>
  <!-- パネル -->
  <div class="overlay">
    <div>
      <h2 id="title">交換日記へようこそ！</h2>
      <p id="text">よりよくサービスを利用するために <br>アカウントを作成 or ログインしてください</p>
      <button onclick="toggle()">切り替え</button>
    </div>
  </div>

</div>

<script>
const container = document.getElementById("container");

let isLogin = true;

function toggle(){
  container.classList.toggle("active");
  isLogin = !isLogin;
}
const form =
    document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(form);

    const data = {
        username: formData.get("username"),
        password: formData.get("password")
    };

    const res = await fetch("/login", {
        credentials: "include",
        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify(data)
    });

    if (res.ok) {

        location.href = "/index.html";

    } else {

        const text = await res.text();

        alert(text);
    }
});
const registerForm =
    document.getElementById("registerForm");

registerForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    const formData = new FormData(registerForm);

    const data = {
        username: formData.get("username"),
        email: formData.get("email"),
        password: formData.get("password")
    };

    const res = await fetch("/register", {
       credentials: "include",
        method: "POST",

        headers: {
            "Content-Type":"application/json"
        },

        body: JSON.stringify(data)
    });

    if (res.ok) {

        location.href = "/index.html";

    } else {

        const text = await res.text();

        alert(text);
    }
});
</script>

</body>
</html>
